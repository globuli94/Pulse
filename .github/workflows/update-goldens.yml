name: Update Golden Screenshots

on:
  workflow_dispatch:

jobs:
  update-goldens:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Update golden screenshots
        run: flutter test --update-goldens test/screenshots/comments_screenshots_test.dart
      - name: Commit updated goldens
        run: |
          git config user.email "noreply@paperclip.ing"
          git config user.name "Paperclip"
          git add screenshots/comments/
          if git diff --staged --quiet; then
            echo "No changes to golden files"
          else
            git commit -m "chore: update golden screenshots on ubuntu/stable Flutter

Regenerated golden PNG files on ubuntu-latest to match CI rendering.
Fixes pixel diff failures on comments golden tests.

Co-Authored-By: Paperclip <noreply@paperclip.ing>"
            git push
          fi
