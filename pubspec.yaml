name: pulse
description: "Pulse — Social Media App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  flutter_bloc: any
  go_router: any
  google_fonts: any
  google_sign_in: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: any
  bloc_test: ^10.0.0
  mocktail: any
  fake_cloud_firestore: ^3.0.0
  flutter_launcher_icons: any

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/pulse_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
